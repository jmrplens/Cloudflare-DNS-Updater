---
name: Tests

on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests (bashunit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
      - name: Install bashunit (pinned)
        run: ./tools/install-bashunit.sh
      - name: Run unit tests
        run: ./lib/bashunit --parallel --log-junit junit.xml tests/
      - name: Coverage report (informational)
        # Serial run: line tracking is unreliable under --parallel. The
        # reported % understates real coverage — the tracker cannot see
        # into functions invoked via command substitution.
        run: |
          set -o pipefail
          ./lib/bashunit --coverage --coverage-paths src tests/ | tail -12
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: junit-report
          path: junit.xml
